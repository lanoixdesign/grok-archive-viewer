<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Imagine Archive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗄️</text></svg>">
</head>
<body>
    <header><div class="container"><h1>Grok Imagine Archive</h1></div></header>

    <div class="container">
        <div class="controls">
            <button class="btn" id="loadArchiveBtn">🗄️ Charger Archive Grok</button>
            <button class="btn secondary" onclick="openProfileModal()">👤 Profil</button>
            <button class="btn secondary" id="toggleTheme">☀️</button>
            <button class="nav-anchor-btn" onclick="scrollToSection('jsonSection')">🔗 Cloud <small id="numberLink">0</small></button>
            <button class="nav-anchor-btn" onclick="scrollToSection('localSection')">📁 Local <small id="numberImg">0</small></button>

            <select id="sortType">
                <option value="all">Tous</option>
                <option value="image">Images</option>
                <option value="video">Vidéos</option>
            </select>
            <select id="sortDate">
                <option value="date-desc">Récent ↓</option>
                <option value="date-asc">Ancien ↑</option>
            </select>
            
            <button class="btn" id="exportBtn">📤 Exporter</button>
            <button class="btn secondary" id="deleteSelectedBtn" style="color: #ff4444; border-color: #ff4444;">🗑️ Suppr. Sélection</button>
            
            <!-- Nouveau bouton pour effacer la session navigateur -->
            <button class="btn secondary" id="clearSessionBtn" style="color: #ffa500; border-color: #ffa500;">🧹 Effacer Session</button>
            
            <button class="btn secondary" id="clearBtn" disabled>Effacer Vue</button>
            <button class="btn secondary" id="donBtn">🇫🇷☕️ Café</button>
        </div>

        <div id="loadingStatus">⏳ Analyse de l'archive en cours...</div>

        <div class="accordion-header collapsed" onclick="toggleAccordion('jsonSection', this)">
            <h2>🔗 Liens Cloud (Archives Fantômes) <small id="numberLink2">0</small></h2><span class="accordion-icon">▼</span>
        </div>
        <div id="jsonSection" class="accordion-content hidden">
            <div class="media-grid" id="jsonLinks"></div>
        </div>

        <div class="accordion-header collapsed" onclick="toggleAccordion('localSection', this)">
            <h2>📁 Fichiers Locaux (Asset Server) <small id="numberImg2">0</small></h2><span class="accordion-icon">▼</span>
        </div>
        <div id="localSection" class="accordion-content hidden">
            <div class="media-grid" id="localFiles"></div>
        </div>
    </div>

    <!-- Modale Profil -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-container">
            <header style="display:flex; justify-content:space-between; align-items:center; padding: 20px; border-bottom: 1px solid var(--border);">
                <h3>Mon Profil Grok</h3>
                <span style="cursor:pointer; font-size:1.5rem" onclick="closeProfileModal()">×</span>
            </header>
            <div class="modal-content" style="padding: 20px; overflow-y: auto;">
                <p><strong>Utilisateur :</strong> <span id="userName"></span></p>
                <p><strong>Email :</strong> <span id="userEmail"></span></p>
                <p><strong>Balance :</strong> <span id="userBalance"></span></p>
                <p><strong>Sessions :</strong> <span id="sessionCount"></span></p>
                <table class="session-table">
                    <thead><tr><th>Ville</th><th>Appareil</th><th>Date</th></tr></thead>
                    <tbody id="sessionList"></tbody>
                </table>
            </div>
            <button class="btn secondary" onclick="closeProfileModal()" style="margin: 20px;">Fermer</button>
        </div>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">×</span>
        <button class="nav-btn prev-btn" id="prevBtn">‹</button>
        <div id="lightboxContent"></div>
        <button class="nav-btn next-btn" id="nextBtn">›</button>
        <div id="lightboxUrlItem" style="position:absolute; bottom:75px;"></div>
        <div id="lightboxCounter" style="position:absolute; bottom:20px; color:white; background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:20px;"></div>
    </div>

    <div id="sharePopup">
        <div class="popup-content">
            <h2>✅ Sélection prête !</h2>
            <button class="btn" style="width:100%; margin-bottom:10px" onclick="downloadFile()">Télécharger JSON</button>
            <button class="btn secondary" style="width:100%" onclick="closePopup()">Fermer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
